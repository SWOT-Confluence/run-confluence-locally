root_dir: "/Users/Ted/Documents/Confluence_Test2"
empty_dir: "/Users/Ted/Documents/Confluence_Test2/confluence_empty"
roi_file: "/Users/Ted/Documents/Confluence_Test2/reaches_of_interest.json"
template_dir: "/Users/Ted/Documents/GitHub/run-confluence-locally/templates"

run_name: "end_to_end"
sword_version: "17"

# Good for testing but this is dangerous for experiments if you forget to change `root_dir` and or `run_name`.
overwrite_run: True 

# Optionally define alternate owner of repo as "owner:branch"
# Ex: input: 'tedlanghorst:main'
github_username: "SWOT-Confluence"
modules_to_run:
  expanded_setfinder: "main"
  expanded_combine_data: "main"
  input: "main"
  non_expanded_setfinder: "main"
  non_expanded_combine_data: "main"
  prediagnostics: "main"
  # priors: "main"
  metroman: "main"
  metroman_consolidation: "main"
  unconstrained_momma: "main"
  constrained_momma: "main"
  hivdi: "main"
  sic4dvar: "main"
  busboi: "main"
  consensus: "main"
  # moi: "main"
  # unconstrained_offline: "main"
  validation: "main"
  output: "main"

# hpc
partition: "ceewater_cjgleason-cpu"
account: "pi_cjgleason_umass_edu"
batch_size: 1000
concurrent_jobs: 400
reach_chunks: 20


module_templates:
  expanded_setfinder:
    time: "06:00:00"
    mem: "4G"
    extra_args: "-r reaches_of_interest.json -e"
    template: "modules/setfinder.sh.j2"
  non_expanded_setfinder:
    time: "06:00:00"
    mem: "4G"
    template: "modules/setfinder.sh.j2"
  expanded_combine_data:
    time: "06:00:00"
    mem: "4G"
    extra_args: "-e"
    template: "modules/combine_data.sh.j2"
  non_expanded_combine_data:
    time: "06:00:00"
    mem: "4G"
    template: "modules/combine_data.sh.j2"
  input:
    time: "24:00:00"
    mem: "4G"
    collection: "SWOT_L2_HR_RiverSP_D"
    time_range: "&start_time=2020-09-01T00:00:00Z&end_time=2026-12-30T00:00:00Z&"
    template: "modules/input.sh.j2"
  prediagnostics:
    time: "06:00:00"
    mem: "4G"
    template: "modules/prediagnostics.sh.j2"
  hivdi:
    time: "06:00:00"
    mem: "4G"
    template: "modules/hivdi.sh.j2"
  busboi:
    time: "06:00:00"
    mem: "4G"
    template: "modules/busboi.sh.j2"
  sic4dvar:
    time: "06:00:00"
    mem: "4G"
    config_file: "sic4dvar_param_confluence.ini"
    template: "modules/sic4dvar.sh.j2"
  metroman:
    time: "06:00:00"
    mem: "4G"
    template: "modules/metroman.sh.j2"
  metroman_consolidation:
    time: "06:00:00"
    mem: "4G"
    template: "modules/metroman_consolidation.sh.j2"
  unconstrained_momma:
    time: "06:00:00"
    mem: "4G"
    m_parameter: 3
    template: "modules/momma.sh.j2"
  constrained_momma:
    time: "06:00:00"
    mem: "4G"
    m_parameter: 3
    extra_args: "-c"
    template: "modules/momma.sh.j2"
  sad:
    time: "06:00:00"
    mem: "4G"
    template: "modules/sad.sh.j2"
  moi:
    time: "00:30:00"
    mem: "2G"
    basin_type: "unconstrained"
